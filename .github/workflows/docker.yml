# Build and publish the SkyPane Docker image automatically.
#
# By default this pushes a multi-arch image (amd64 + arm64, so it runs on PCs and
# Raspberry Pis) to GitHub Container Registry — ghcr.io/<owner>/<repo> — using the
# token GitHub provides automatically. No secrets to configure.
#
# It runs when you push a version tag (e.g. `git tag v1.0.0 && git push origin v1.0.0`)
# or when you trigger it by hand from the repo's Actions tab.
#
# ── One-time setup ────────────────────────────────────────────────────────────
#   • Nothing required for ghcr.io — the workflow-level `permissions` below are
#     enough. After the first run, open the new package under your repo's
#     "Packages", and (optionally) set its visibility to Public.
#
# ── Prefer Docker Hub instead? ────────────────────────────────────────────────
#   1. Add two repo secrets (Settings → Secrets and variables → Actions):
#        DOCKERHUB_USERNAME  and  DOCKERHUB_TOKEN  (a Docker Hub access token)
#   2. In the "Log in" step, replace registry/username/password with:
#        registry: docker.io
#        username: ${{ secrets.DOCKERHUB_USERNAME }}
#        password: ${{ secrets.DOCKERHUB_TOKEN }}
#   3. In the "Docker metadata" step, set:
#        images: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/skypane

name: Publish Docker image

on:
  push:
    tags: ['v*']
  workflow_dispatch: # lets you run it manually from the Actions tab

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # allows pushing to ghcr.io with the built-in token

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
